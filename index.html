<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박라현과 평생 함께 하시겠습니까?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #ffe0ea, #fff7fb);
    }

    .card {
      width: min(90vw, 560px);
      padding: 48px 32px;
      text-align: center;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      position: relative;
    }

    h1 {
      margin: 0 0 36px;
      font-size: 2rem;
      line-height: 1.5;
      color: #ff3d7a;
    }

    .button-area {
      position: relative;
      width: 100%;
      height: 180px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #yesBtn {
      background: #ff4f8b;
      color: white;
      position: absolute;
      left: 50%;
      top: 110px;
      transform: translateX(-120%);
    }

    #noBtn {
      background: #f2f2f2;
      color: #444;
      position: absolute;
      left: 50%;
      top: 110px;
      transform: translateX(20%);
    }

    .result {
      margin-top: 24px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff3d7a;
      min-height: 32px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>박라현과 평생 함께 하시겠습니까?</h1>

    <div class="button-area" id="area">
      <button id="yesBtn">동의함</button>
      <button id="noBtn">동의하지 않음</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const area = document.getElementById("area");
    const result = document.getElementById("result");

    function moveAwayFromMouse(event) {
      const areaRect = area.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const mouseX = event.clientX - areaRect.left;
      const mouseY = event.clientY - areaRect.top;

      const btnX = noBtn.offsetLeft + btnRect.width / 2;
      const btnY = noBtn.offsetTop + btnRect.height / 2;

      let dx = btnX - mouseX;
      let dy = btnY - mouseY;

      const distance = Math.sqrt(dx * dx + dy * dy) || 1;

      dx /= distance;
      dy /= distance;

      const moveDistance = 120;

      let newX = noBtn.offsetLeft + dx * moveDistance;
      let newY = noBtn.offsetTop + dy * moveDistance;

      const maxX = area.clientWidth - noBtn.offsetWidth;
      const maxY = area.clientHeight - noBtn.offsetHeight;

      newX = Math.max(0, Math.min(newX, maxX));
      newY = Math.max(0, Math.min(newY, maxY));

      noBtn.style.left = `${newX}px`;
      noBtn.style.top = `${newY}px`;
      noBtn.style.transform = "none";
    }

    document.addEventListener("mousemove", (event) => {
      const btnRect = noBtn.getBoundingClientRect();
      const mouseX = event.clientX;
      const mouseY = event.clientY;

      const buffer = 90;
      const isNear =
        mouseX > btnRect.left - buffer &&
        mouseX < btnRect.right + buffer &&
        mouseY > btnRect.top - buffer &&
        mouseY < btnRect.bottom + buffer;

      if (isNear) {
        moveAwayFromMouse(event);
      }
    });

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
    });

    yesBtn.addEventListener("click", () => {
      result.textContent = "고맙습니다. 평생 함께하는 것으로 계약이 체결되었습니다 ❤️";
    });
  </script>
</body>
</html>
